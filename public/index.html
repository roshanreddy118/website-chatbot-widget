<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Gemini Chatbot Embed Demo</title>
    <style>
      body {
        margin: 0;
        color: #182230;
        background: #f6f8fb;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main {
        width: min(920px, calc(100% - 32px));
        margin: 0 auto;
        padding: 64px 0;
      }

      h1 {
        max-width: 760px;
        margin: 0 0 14px;
        font-size: clamp(34px, 7vw, 64px);
        line-height: 1.02;
        letter-spacing: 0;
      }

      p {
        max-width: 680px;
        margin: 0 0 22px;
        color: #475467;
        font-size: 18px;
        line-height: 1.6;
      }

      code {
        display: block;
        max-width: 100%;
        overflow-x: auto;
        border: 1px solid #dbe3ef;
        border-radius: 8px;
        background: #fff;
        padding: 16px;
        color: #344054;
        font-size: 14px;
        line-height: 1.5;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Gemini chatbot embed</h1>
      <p>
        This page simulates a customer website. The chat button in the lower-right corner is loaded
        from one script tag and talks to your Gemini API proxy.
      </p>
      <code>&lt;script src="https://your-domain.com/widget.js" data-api-url="https://your-domain.com" data-bot-name="Site Assistant"&gt;&lt;/script&gt;</code>
    </main>

    <script src="/widget.js" data-api-url="" data-bot-name="Site Assistant"></script>
  </body>
</html>
